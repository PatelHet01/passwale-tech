<!-- Interactions Script -->
<script>
        let selectedCount = 0;
        const continueBtn = document.getElementById('continue-btn');

        function toggleScene(element) {
            const isSelected = element.classList.contains('selected');
            const check = element.querySelector('.check-indicator');

            if (isSelected) {
                element.classList.remove('selected');
                check.classList.add('opacity-0');
                check.classList.remove('opacity-100');
                selectedCount--;
            } else {
                element.classList.add('selected');
                check.classList.remove('opacity-0');
                check.classList.add('opacity-100');
                selectedCount++;
                
                // Add Haptic-like scale effect on click
                element.style.transform = "scale(0.95)";
                setTimeout(() => {
                    element.style.transform = "scale(1.08)";
                }, 100);
            }

            // Update Button State
            if (selectedCount > 0) {
                continueBtn.disabled = false;
                continueBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                continueBtn.classList.add('hover:scale-105', 'active:scale-95');
            } else {
                continueBtn.disabled = true;
                continueBtn.classList.add('opacity-50', 'cursor-not-allowed');
                continueBtn.classList.remove('hover:scale-105', 'active:scale-95');
            }
        }

        // Add subtle mouse hover parallax for desktop
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            const floatingIcons = document.querySelectorAll('.floating-icon');
            floatingIcons.forEach(icon => {
                icon.style.transform = `translate(${x}px, ${y}px)`;
            });
        });

        // Continue Action
        continueBtn.addEventListener('click', () => {
            if (selectedCount > 0) {
                continueBtn.innerHTML = `<span>Finalizing...</span><span class="material-symbols-outlined animate-spin">sync</span>`;
                setTimeout(() => {
                    alert('Setting up your PASSWALE dashboard!');
                }, 1500);
            }
        });
    </script>
