<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PASSWALE | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500&family=Space+Grotesk:wght@600;700&family=Space+Mono:wght@500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Anton:wght@100..900&family=Inter:wght@100..900&family=Space+Grotesk:wght@100..900&family=Space+Mono:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Diagonal Stripe Background Logic */
        .diagonal-bg {
            background-color: #0D1B3E; /* Deep Navy Base */
            background-image: 
                linear-gradient(105deg, transparent 40%, rgba(250, 204, 21, 0.05) 40%, rgba(250, 204, 21, 0.05) 45%, transparent 45%),
                linear-gradient(105deg, transparent 60%, rgba(255, 255, 255, 0.03) 60%, rgba(255, 255, 255, 0.03) 65%, transparent 65%);
            background-size: 200px 200px;
        }

        /* Neumorphic Input "Wells" */
        .neu-inset {
            background: #0D1B3E;
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.4), 
                        inset -2px -2px 6px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neu-inset:focus-within {
            border-color: #FACC15;
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.5), 
                        0 0 10px rgba(250, 204, 21, 0.2);
        }

        /* Power Pass Button 3D Effect */
        .power-pass-btn {
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .power-pass-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000;
        }
        .power-pass-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #000;
        }

        /* Glassmorphic Edge */
        .glass-edge {
            position: relative;
        }
        .glass-edge::after {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.1) 100%);
            border-radius: inherit;
            z-index: -1;
            pointer-events: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#121414",
                        "on-tertiary": "#333025",
                        "secondary-container": "#eec200",
                        "on-background": "#e2e2e2",
                        "on-surface": "#e2e2e2",
                        "primary": "#b9c5f2",
                        "secondary": "#ffe083",
                        "tertiary": "#ccc6b6",
                        "background": "#121414",
                        "primary-container": "#0d1b3e",
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "xl": "40px",
                        "grid-margin": "20px"
                    },
                    "fontFamily": {
                        "display-xl": ["Anton"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"],
                        "body-md": ["Inter"],
                        "label-mono": ["Space Mono"],
                        "cta": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "display-xl": ["80px", {"lineHeight": "80px", "letterSpacing": "0.02em", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-mono": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1em", "fontWeight": "500"}],
                        "cta": ["16px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="diagonal-bg min-h-screen flex items-center justify-center p-grid-margin font-body-md text-on-surface">
<!-- Login Container -->
<div class="relative w-full max-w-md group">
<!-- Badge Logo (Floating) -->
<div class="absolute -top-12 left-1/2 -translate-x-1/2 z-20">
<div class="bg-secondary text-on-secondary-fixed p-4 rounded-xl border-4 border-surface shadow-2xl rotate-3 flex items-center justify-center transform group-hover:rotate-0 transition-transform duration-500">
<span class="font-display-xl text-4xl uppercase tracking-tighter leading-none">PASSWALE</span>
</div>
</div>
<!-- Center Card -->
<div class="glass-edge bg-white rounded-xl p-lg md:p-xl shadow-[0_35px_60px_-15px_rgba(0,0,0,0.6)] relative overflow-hidden">
<!-- Card Decoration (Diagonal Slash) -->
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary/10 -mr-16 -mt-16 rotate-45 pointer-events-none"></div>
<div class="mt-8 text-center mb-lg">
<h1 class="font-headline-md text-headline-md text-surface mb-xs">Welcome Back</h1>
<p class="font-body-md text-surface/60">Unlock your next high-octane experience</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-md">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-mono text-label-mono text-surface/40 uppercase px-1">Email / Username</label>
<div class="neu-inset rounded-lg p-1 flex items-center">
<div class="px-md text-secondary">
<span class="material-symbols-outlined">person</span>
</div>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full py-md font-body-md placeholder:text-on-surface/20" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-end px-1">
<label class="font-label-mono text-label-mono text-surface/40 uppercase">Secret Key</label>
<a class="font-label-mono text-[10px] text-secondary-container hover:underline" href="#">Forgot?</a>
</div>
<div class="neu-inset rounded-lg p-1 flex items-center">
<div class="px-md text-secondary">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full py-md font-body-md placeholder:text-on-surface/20" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary CTA -->
<button class="power-pass-btn w-full bg-secondary text-surface font-cta text-cta py-lg rounded-lg border-2 border-surface flex items-center justify-center gap-sm mt-lg" type="submit">
<span>ACCESS THE SCENE</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-xl flex items-center">
<div class="flex-grow border-t border-surface/10"></div>
<span class="px-md font-label-mono text-label-mono text-surface/30">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-surface/10"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm py-md px-md rounded-lg border border-surface/10 hover:bg-surface/5 transition-colors font-cta text-surface/80">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBd_h55mBHHOOQjLfWNDw2ljh6obwQQapEpvgIkXQLRLTdDgOQnWiEi8_5ZlH75ZMGiV1pYodvUAZ8xZXnk36qDLFwKjOzNe5t-jwihTmtzNozawmipdnJpMm9nUH_DbaJNZEpXUk8_NkEfT0JvRcGSJvvw_fd5vVn5k8vNs3hK1o_MCXsBtIZlFL3W8bciTYgTz5xNVfEsGe-q8_mojamVyuK6AsIfeubrHiZhM2qWsntLGZoe_uYnIG7g4tT6CxZijHNea2AxVEQ"/>
<span class="text-xs">GOOGLE</span>
</button>
<button class="flex items-center justify-center gap-sm py-md px-md rounded-lg border border-surface/10 hover:bg-surface/5 transition-colors font-cta text-surface/80">
<span class="material-symbols-outlined text-surface/60">phone_iphone</span>
<span class="text-xs">PHONE</span>
</button>
</div>
<!-- Footer Link -->
<div class="mt-xl text-center">
<p class="font-body-md text-surface/40">
                    New to the pit? 
                    <a class="text-surface font-bold hover:text-secondary-container transition-colors" href="#">Apply for Pass</a>
</p>
</div>
</div>
<!-- Decorative Elements -->
<div class="absolute -bottom-6 -right-6 w-24 h-24 bg-primary/20 blur-2xl rounded-full -z-10 animate-pulse"></div>
<div class="absolute -top-10 -left-10 w-32 h-32 bg-secondary/10 blur-3xl rounded-full -z-10 animate-pulse" style="animation-delay: 1s;"></div>
</div>
<!-- Background Decorative Text -->
<div class="fixed bottom-10 left-10 opacity-5 pointer-events-none hidden lg:block">
<h2 class="font-display-xl text-8xl text-white uppercase -rotate-12">LIVE LIFE</h2>
</div>
<div class="fixed top-20 right-10 opacity-5 pointer-events-none hidden lg:block">
<h2 class="font-display-xl text-8xl text-white uppercase rotate-12">EXPERIENCE</h2>
</div>
<script>
        // Simple micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.02]');
                input.parentElement.classList.add('duration-200');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.02]');
            });
        });
    </script>
</body></html>
