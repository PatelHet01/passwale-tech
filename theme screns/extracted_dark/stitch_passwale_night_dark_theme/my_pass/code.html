<script>
        // Micro-interaction for the scanner line
        const scannerLine = document.getElementById('scanner-line');
        let pos = 0;
        let direction = 1;

        function animateScanner() {
            pos += 0.8 * direction;
            if (pos >= 158 || pos <= 0) {
                direction *= -1;
            }
            scannerLine.style.top = `${pos}px`;
            requestAnimationFrame(animateScanner);
        }
        animateScanner();

        // Parallax tilt effect on the ticket
        const ticket = document.querySelector('.group > .paper-texture');
        const container = document.querySelector('.group');

        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = (y - centerY) / 20;
            const rotateY = (centerX - x) / 20;
            
            ticket.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        container.addEventListener('mouseleave', () => {
            ticket.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
        });
    </script>
